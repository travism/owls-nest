services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - media:/var/owlsnest/media
    depends_on:
      redis:
        condition: service_healthy

  build-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.build-worker
    restart: unless-stopped
    env_file:
      - ../.env
    volumes:
      - web-dist:/app/web/dist
      - media:/var/owlsnest/media:ro
    depends_on:
      redis:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - web-dist:/usr/share/nginx/html:ro
      - media:/usr/share/nginx/html/media:ro

  admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile.admin
    restart: unless-stopped
    ports:
      - "8081:80"

volumes:
  redis-data:
  web-dist:
  media:
