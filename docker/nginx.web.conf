server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Long-cache hashed assets (Astro builds with content-hashed filenames)
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Media volume (gallery, blog images) — content-hashed, cache hard
  location /media/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Default: try file, fall back to 404
  location / {
    try_files $uri $uri/ $uri.html =404;
  }
}
